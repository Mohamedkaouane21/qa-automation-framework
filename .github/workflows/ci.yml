name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .

  unit:
    name: Unit + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run unit tests with coverage gate
        run: pytest -m unit --cov=src --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run API tests
        run: pytest -m api --reruns 2 --reruns-delay 3
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-api
          path: reports/allure-results

  ui:
    name: UI tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Install Playwright browser
        run: python -m playwright install --with-deps ${{ matrix.browser }}
      - name: Run UI tests
        run: |
          pytest -m ui --browser ${{ matrix.browser }} \
            --reruns 2 --reruns-delay 3 \
            --screenshot=only-on-failure --video=retain-on-failure \
            --tracing=retain-on-failure --output=reports/ui-artifacts
      - name: Upload failure artifacts (screenshots/video/trace)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ui-artifacts-${{ matrix.browser }}
          path: reports/ui-artifacts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-ui-${{ matrix.browser }}
          path: reports/allure-results

  bdd:
    name: BDD scenarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m playwright install --with-deps chromium
      - name: Run BDD scenarios
        run: pytest -m bdd --reruns 2 --reruns-delay 3 --output=reports/ui-artifacts

  traceability:
    name: Traceability matrix is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Verify matrix matches the live suite
        run: python scripts/gen_traceability.py --check

  perf:
    name: Perf smoke (k6, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 load test
        uses: grafana/setup-k6-action@v1
      - run: k6 run perf/booking_load.js
