[pytest]
# Default options applied to every run. HTML + Allure reports and reruns are
# enabled here so local runs match CI behaviour out of the box.
addopts =
    -ra
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure-results

testpaths = tests

# Make src/ and config/ importable as top-level packages from any test.
pythonpath = .

# Custom markers. `req` carries the requirement ID used to build the
# requirements-to-tests traceability matrix (the differentiator).
markers =
    smoke: critical happy-path checks, fast feedback subset
    regression: broader coverage run on every PR
    ui: end-to-end UI tests (Playwright)
    api: REST API tests (httpx)
    unit: unit tests for the in-repo support library
    bdd: behaviour-driven scenarios (Gherkin)
    req(id): links a test to a requirement ID, e.g. req("REQ-UI-01")
